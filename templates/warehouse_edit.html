{% extends "base.html" %}
{% block title %}Редактировать склад{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{{ url_for('warehouses') }}" class="btn btn-sm btn-back">← Назад</a>
    <h1>Редактировать склад</h1>
</div>

<div class="card card-narrow">
    <form method="POST" class="form-col">
        <div class="form-group">
            <label>Название <span class="required">*</span></label>
            <input type="text" name="name" required value="{{ warehouse.name }}">
        </div>
        <div class="form-group">
            <label>Адрес</label>
            <input type="text" name="address" value="{{ warehouse.address or '' }}">
        </div>
        <div class="form-group">
            <label>Описание</label>
            <input type="text" name="description" value="{{ warehouse.description or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('warehouses') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
