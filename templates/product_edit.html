{% extends "base.html" %}
{% block title %}Редактировать товар{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{{ url_for('products') }}" class="btn btn-sm btn-back">← Назад</a>
    <h1>Редактировать товар</h1>
</div>

<div class="card card-narrow">
    <form method="POST" class="form-col">
        <div class="form-group">
            <label>Артикул <span class="required">*</span></label>
            <input type="text" name="sku" required value="{{ product.sku }}">
        </div>
        <div class="form-group">
            <label>Название <span class="required">*</span></label>
            <input type="text" name="name" required value="{{ product.name }}">
        </div>
        <div class="form-group">
            <label>Размер</label>
            <input type="text" name="size" value="{{ product.size or '' }}">
        </div>
        <div class="form-group">
            <label>Цвет</label>
            <input type="text" name="color" value="{{ product.color or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('products') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
